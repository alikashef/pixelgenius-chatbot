services:
  caddy:
    image: caddy:2-alpine
    profiles:
      - edge
    restart: unless-stopped
    ports:
      - "80:80"
      - "443:443"
    environment:
      APP_DOMAIN: ${APP_DOMAIN:-chat.pixelgenius.ir}
      CADDY_EMAIL: ${CADDY_EMAIL:-admin@pixelgenius.ir}
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      - frontend
      - backend

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelance_intake
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
      args:
        PYTHON_IMAGE: ${PYTHON_IMAGE:-python:3.12-slim}
        PIP_INDEX_URL: ${PIP_INDEX_URL:-https://pypi.org/simple}
        PIP_TRUSTED_HOST: ${PIP_TRUSTED_HOST:-}
    restart: unless-stopped
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/freelance_intake
      GAPGPT_API_KEY: ${GAPGPT_API_KEY}
      GAPGPT_BASE_URLS: ${GAPGPT_BASE_URLS:-}
      GAPGPT_TIMEOUT_SECONDS: ${GAPGPT_TIMEOUT_SECONDS:-3}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      MELIPAYAMAK_SHARED_URL: ${MELIPAYAMAK_SHARED_URL}
      MELIPAYAMAK_BODY_ID: ${MELIPAYAMAK_BODY_ID:-459793}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-node:20-alpine}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
        NPM_REGISTRY: ${NPM_REGISTRY:-https://registry.npmjs.org/}
    restart: unless-stopped
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-}
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
  caddy_data:
  caddy_config:
