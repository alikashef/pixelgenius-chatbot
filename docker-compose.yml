version: "3.9"

services:
  db:
    image: docker.arvancloud.ir/library/postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: freelance_intake
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 10

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@db:5432/freelance_intake
      GAPGPT_API_KEY: ${GAPGPT_API_KEY}
      ZARINPAL_MERCHANT_ID: ${ZARINPAL_MERCHANT_ID}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME:-admin}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-admin123}
      MELIPAYAMAK_USERNAME: ${MELIPAYAMAK_USERNAME}
      MELIPAYAMAK_PASSWORD: ${MELIPAYAMAK_PASSWORD}
      MELIPAYAMAK_FROM: ${MELIPAYAMAK_FROM}
    volumes:
      - uploads:/app/uploads
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:8000}
    depends_on:
      - backend

volumes:
  pgdata:
  uploads:
